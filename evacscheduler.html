<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOOMI Scheduler</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00A651;
    --green-dim: #007a3d;
    --navy: #1a3a5c;
    --navy-light: #234d75;
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1e2530;
    --surface3: #252d38;
    --border: #2a3340;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --text-muted: #4a5568;
    --red: #e05252;
    --yellow: #d4a017;
    --full: #00A651;
    --partial: #d4a017;
    --empty: #e05252;
    --drawer-width: 400px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .header {
    background: var(--navy);
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 24px;
    height: 52px;
    border-bottom: 2px solid var(--green);
    flex-shrink: 0;
  }
  .logo { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; color: var(--green); letter-spacing: 0.12em; }
  .header-divider { width: 1px; height: 24px; background: var(--navy-light); }
  .activation-badge { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); letter-spacing: 0.06em; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

  .reload-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
  }
  .reload-btn:hover { color: var(--text); border-color: var(--text-dim); }

  .site-tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    flex-shrink: 0;
  }
  .site-tab {
    padding: 10px 24px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s;
  }
  .site-tab.active { color: var(--text); border-bottom-color: var(--green); }
  .site-tab:hover:not(.active) { color: var(--text); }

  .week-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .week-nav button {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 28px; height: 28px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .week-nav button:hover { background: var(--surface3); }
  .week-label { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); letter-spacing: 0.06em; }
  .legend { margin-left: auto; display: flex; gap: 16px; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-dim); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .role-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 20px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .role-bar label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }
  .role-bar select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-family: 'IBM Plex Sans', sans-serif;
    cursor: pointer;
    min-width: 220px;
  }
  .role-bar select:focus { outline: 1px solid var(--green); }
  .add-role-btn {
    background: var(--green);
    border: none;
    color: #fff;
    padding: 4px 14px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .add-role-btn:hover { background: var(--green-dim); }

  .grid-wrapper { flex: 1; overflow: auto; position: relative; }
  .grid-table { border-collapse: collapse; width: max-content; min-width: 100%; }

  .role-col { position: sticky; left: 0; z-index: 10; background: var(--surface); width: 185px; min-width: 185px; }
  .role-header-cell {
    position: sticky; left: 0; top: 0; z-index: 20;
    background: var(--surface);
    padding: 10px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; letter-spacing: 0.1em; color: var(--text-muted); text-transform: uppercase;
    border-right: 2px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  thead th { position: sticky; top: 0; z-index: 5; background: var(--surface2); border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
  .date-header { padding: 8px 4px 6px; text-align: center; min-width: 76px; }
  .date-dow { font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 2px; }
  .date-num { font-family: 'IBM Plex Mono', monospace; font-size: 15px; font-weight: 600; color: var(--text); display: block; }
  .date-mon { font-size: 9px; color: var(--text-muted); display: block; margin-top: 1px; }
  .date-header.today .date-num { color: var(--green); }

  .shift-section-row td {
    padding: 5px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  .shift-section-row.day-section td { background: rgba(212,160,23,0.08); color: #d4a017; border-left: 3px solid #d4a017; }
  .shift-section-row.night-section td { background: rgba(26,58,92,0.5); color: #7aa8d4; border-left: 3px solid #7aa8d4; }
  .shift-section-row td.role-col { background: inherit; }

  .role-cell-inner {
    padding: 0 10px 0 14px; height: 44px;
    border-right: 2px solid var(--border); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; gap: 4px;
  }
  .role-cell-inner.day-row { border-left: 3px solid rgba(212,160,23,0.4); }
  .role-cell-inner.night-row { border-left: 3px solid rgba(122,168,212,0.4); }
  .role-name-wrap { flex: 1; min-width: 0; }
  .role-name { font-size: 11px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
  .role-req { font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--text-muted); }
  .remove-role-btn {
    background: transparent; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 14px; padding: 2px 4px; line-height: 1; border-radius: 3px;
    opacity: 0; transition: opacity 0.15s, color 0.15s; flex-shrink: 0;
  }
  tr:hover .remove-role-btn { opacity: 1; }
  .remove-role-btn:hover { color: var(--red); }

  .slot-cell { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 3px; cursor: pointer; min-width: 76px; transition: filter 0.1s; }
  .slot-cell:hover { filter: brightness(1.3); }
  .slot-inner { border-radius: 4px; height: 38px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; }
  .slot-count { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; }
  .slot-label { font-size: 9px; letter-spacing: 0.05em; text-transform: uppercase; opacity: 0.7; }
  .slot-inner.full { background: rgba(0,166,81,0.13); border: 1px solid rgba(0,166,81,0.32); }
  .slot-inner.full .slot-count { color: var(--full); }
  .slot-inner.partial { background: rgba(212,160,23,0.1); border: 1px solid rgba(212,160,23,0.28); }
  .slot-inner.partial .slot-count { color: var(--partial); }
  .slot-inner.empty { background: rgba(224,82,82,0.08); border: 1px solid rgba(224,82,82,0.22); }
  .slot-inner.empty .slot-count { color: var(--empty); }

  /* LOADING */
  .loading-overlay {
    position: absolute; inset: 0;
    background: rgba(13,17,23,0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 50;
    flex-direction: column; gap: 12px;
    transition: opacity 0.2s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); letter-spacing: 0.08em; }

  .error-bar {
    background: rgba(224,82,82,0.12);
    border-bottom: 1px solid rgba(224,82,82,0.3);
    padding: 6px 20px;
    font-size: 12px;
    color: var(--red);
    display: none;
    flex-shrink: 0;
  }

  /* DRAWER */
  .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .drawer-overlay.open { opacity: 1; pointer-events: all; }
  .drawer {
    position: fixed; right: 0; top: 0; bottom: 0;
    width: var(--drawer-width);
    background: var(--surface); border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.22s cubic-bezier(0.4,0,0.2,1);
    z-index: 201;
  }
  .drawer.open { transform: translateX(0); }
  .drawer-header { padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--navy); flex-shrink: 0; position: relative; }
  .drawer-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .drawer-meta { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 0.06em; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .shift-badge { padding: 1px 7px; border-radius: 3px; font-size: 9px; font-weight: 600; }
  .shift-badge.day { background: rgba(212,160,23,0.3); color: #d4a017; }
  .shift-badge.night { background: rgba(26,58,92,0.8); color: #7aa8d4; }
  .site-badge { background: var(--surface3); border: 1px solid var(--border); color: var(--text-dim); padding: 1px 7px; border-radius: 3px; font-size: 9px; }
  .drawer-close { position: absolute; top: 14px; right: 16px; background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-size: 18px; line-height: 1; padding: 4px; border-radius: 4px; }
  .drawer-close:hover { color: var(--text); background: var(--surface2); }
  .drawer-body { flex: 1; overflow-y: auto; padding: 16px; }

  .drawer-section-label { font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; margin-top: 16px; }
  .drawer-section-label:first-child { margin-top: 0; }

  .person-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 5px; margin-bottom: 4px; background: var(--surface2); border: 1px solid var(--border); }
  .person-row.assigned { border-color: rgba(0,166,81,0.3); background: rgba(0,166,81,0.06); }
  .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--navy); display: flex; align-items: center; justify-content: center; font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; color: var(--green); flex-shrink: 0; }
  .person-info { flex: 1; min-width: 0; }
  .person-name { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .person-sub { font-family: 'IBM Plex Mono', monospace; font-size: 10px; color: var(--text-muted); display: flex; gap: 5px; margin-top: 1px; flex-wrap: wrap; }
  .night-badge { background: rgba(26,58,92,0.8); border: 1px solid var(--navy-light); color: #7aa8d4; padding: 0 5px; border-radius: 3px; font-size: 9px; font-weight: 600; }
  .role-tag { background: var(--surface3); border: 1px solid var(--border); color: var(--text-muted); padding: 0 5px; border-radius: 3px; font-size: 9px; }
  .assign-btn { background: var(--green); color: #fff; border: none; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background 0.15s; flex-shrink: 0; }
  .assign-btn:hover { background: var(--green-dim); }
  .assign-btn:disabled { background: var(--surface3); color: var(--text-muted); cursor: not-allowed; }
  .remove-btn { background: transparent; color: var(--text-muted); border: 1px solid var(--border); padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
  .remove-btn:hover { color: var(--red); border-color: var(--red); }
  .remove-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .empty-state { text-align: center; padding: 20px 0; color: var(--text-muted); font-size: 12px; }

  .summary-bar { padding: 6px 20px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 20px; flex-shrink: 0; align-items: center; }
  .summary-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); }
  .summary-dot { width: 7px; height: 7px; border-radius: 50%; }

  .grid-wrapper::-webkit-scrollbar { width: 8px; height: 8px; }
  .grid-wrapper::-webkit-scrollbar-track { background: var(--bg); }
  .grid-wrapper::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }
  .drawer-body::-webkit-scrollbar { width: 6px; }
  .drawer-body::-webkit-scrollbar-track { background: var(--surface); }
  .drawer-body::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">LOOMI — Scheduler</div>
  <div class="header-divider"></div>
  <div class="activation-badge">2026-KASH-HUBHOST</div>
  <div class="header-right">
    <button class="reload-btn" onclick="loadData()">&#8635; Refresh</button>
  </div>
</div>

<div id="error-bar" class="error-bar"></div>

<div class="site-tabs">
  <button class="site-tab active" onclick="setSite('Kingston',this)">Kingston</button>
  <button class="site-tab" onclick="setSite('Kapuskasing',this)">Kapuskasing</button>
  <button class="site-tab" onclick="setSite('Timmins',this)">Timmins</button>
</div>

<div class="week-nav">
  <button onclick="shiftWeek(-1)">&#8249;</button>
  <span class="week-label" id="week-label"></span>
  <button onclick="shiftWeek(1)">&#8250;</button>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--full)"></div>Full</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--partial)"></div>Partial</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--empty)"></div>Gap</div>
  </div>
</div>

<div class="role-bar">
  <label>Add Position:</label>
  <select id="role-picker"></select>
  <button class="add-role-btn" onclick="addRoleToGrid()">+ Add</button>
</div>

<div class="grid-wrapper">
  <div class="loading-overlay" id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">Loading schedules...</div>
  </div>
  <table class="grid-table" id="sched-grid"></table>
</div>

<div class="summary-bar" id="summary-bar"></div>

<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <button class="drawer-close" onclick="closeDrawer()">&#10005;</button>
    <div class="drawer-title" id="drawer-title"></div>
    <div class="drawer-meta" id="drawer-meta"></div>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<script>
// ============================================================
// CONFIG - replace with your deployed Worker URL
// ============================================================
const WORKER_URL = 'https://evacscheduling.loomex-it.workers.dev';

// ============================================================
// ROLE CATALOGUE
// ============================================================
const ALL_ROLES = [
  { id: 'ic',          name: 'Incident Commander',     req: 1 },
  { id: 'dep_ic',      name: 'Deputy IC',              req: 1 },
  { id: 'ops_chief',   name: 'Operations Chief',       req: 1 },
  { id: 'log_chief',   name: 'Logistics Chief',        req: 1 },
  { id: 'fin_admin',   name: 'Finance/Admin Chief',    req: 1 },
  { id: 'evac_coord',  name: 'Evacuee Coordinator',    req: 2 },
  { id: 'reg_lead',    name: 'Registration Lead',      req: 2 },
  { id: 'health_lead', name: 'Health & Wellness Lead', req: 1 },
  { id: 'transport',   name: 'Transport Coordinator',  req: 1 },
  { id: 'comm_lead',   name: 'Communications Lead',    req: 1 },
  { id: 'admin',       name: 'Admin Support',          req: 2 },
];

let activeRoles = ALL_ROLES.map(r => r.id);

// ============================================================
// STATE (populated from API)
// ============================================================
let contractors  = [];  // [{ recordId, contractorId, name, initials, contractorRole, nightOk }]
let availability = [];  // [{ recordId, contractorRef, windows: [{start,end}] }]
let assignments  = [];  // [{ recordId, contractorRecordId, location, startDate, endDate, roleAssigned, shift }]

let currentSite  = 'Kingston';
let weekOffset   = 0;
let drawerState  = null;

const BASE_DATE = new Date('2026-03-24T00:00:00');
const TODAY_STR = new Date().toISOString().slice(0, 10);
const DOW = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
const MON = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ============================================================
// HELPERS
// ============================================================
function dateStr(d) { return d.toISOString().slice(0, 10); }

function getWeekDates() {
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(BASE_DATE);
    d.setDate(d.getDate() + weekOffset * 7 + i);
    return d;
  });
}

function isInRange(ds, start, end) {
  return ds >= start && ds <= end;
}

// Check if a contractor is available on a given date/shift
// Matches by recordId OR by contractorId (text) depending on how Availability.ContractorID is set up
function isAvailable(contractor, ds, shift) {
  if (shift === 'night' && !contractor.nightOk) return false;
  const avail = availability.find(a =>
    a.contractorRef === contractor.recordId ||
    a.contractorRef === contractor.contractorId
  );
  if (!avail) return false;
  return avail.windows.some(w => isInRange(ds, w.start, w.end));
}

// Get contractors assigned to a role/site/shift on a specific date
function getAssignedOn(site, roleId, shift, ds) {
  const roleName = ALL_ROLES.find(r => r.id === roleId)?.name || roleId;
  return assignments.filter(a =>
    a.location === site &&
    a.roleAssigned === roleName &&
    a.shift === (shift === 'day' ? 'Day' : 'Night') &&
    isInRange(ds, a.startDate, a.endDate)
  );
}

// ============================================================
// API CALLS
// ============================================================
function showError(msg) {
  const bar = document.getElementById('error-bar');
  bar.textContent = msg;
  bar.style.display = 'block';
  setTimeout(() => { bar.style.display = 'none'; }, 6000);
}

function setLoading(on) {
  document.getElementById('loading-overlay').classList.toggle('hidden', !on);
}

async function loadData() {
  setLoading(true);
  try {
    const dates = getWeekDates();
    const start = dateStr(dates[0]);
    const end   = dateStr(dates[6]);

    const [ctrs, avail, assigns] = await Promise.all([
      fetch(`${WORKER_URL}/contractors`).then(r => r.json()),
      fetch(`${WORKER_URL}/availability?start=${start}&end=${end}`).then(r => r.json()),
      fetch(`${WORKER_URL}/assignments?location=${encodeURIComponent(currentSite)}&start=${start}&end=${end}`).then(r => r.json()),
    ]);

    if (ctrs.error)    throw new Error('Contractors: ' + ctrs.error);
    if (avail.error)   throw new Error('Availability: ' + avail.error);
    if (assigns.error) throw new Error('Assignments: '  + assigns.error);

    contractors  = ctrs;
    availability = avail;
    assignments  = assigns;

    renderGrid();
    if (drawerState) renderDrawer();
  } catch (err) {
    showError('Failed to load data: ' + err.message);
  } finally {
    setLoading(false);
  }
}

async function apiCreateAssignment(payload) {
  const res  = await fetch(`${WORKER_URL}/assignments`, {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify(payload),
  });
  return res.json();
}

async function apiDeleteAssignment(recordId) {
  const res = await fetch(`${WORKER_URL}/assignments/${recordId}`, { method: 'DELETE' });
  return res.json();
}

// ============================================================
// ROLE PICKER
// ============================================================
function populateRolePicker() {
  const sel = document.getElementById('role-picker');
  const available = ALL_ROLES.filter(r => !activeRoles.includes(r.id));
  sel.innerHTML   = available.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
  sel.disabled    = available.length === 0;
}

function addRoleToGrid() {
  const val = document.getElementById('role-picker').value;
  if (val && !activeRoles.includes(val)) {
    activeRoles.push(val);
    populateRolePicker();
    renderGrid();
  }
}

function removeRoleFromGrid(roleId) {
  activeRoles = activeRoles.filter(id => id !== roleId);
  populateRolePicker();
  renderGrid();
}

// ============================================================
// RENDER GRID
// ============================================================
function renderGrid() {
  const dates = getWeekDates();
  const d0 = dates[0], d6 = dates[6];
  document.getElementById('week-label').textContent =
    `${MON[d0.getMonth()].toUpperCase()} ${d0.getDate()} \u2013 ${MON[d6.getMonth()].toUpperCase()} ${d6.getDate()}, ${d6.getFullYear()}`;

  const roles = activeRoles.map(id => ALL_ROLES.find(r => r.id === id)).filter(Boolean);
  let html = '<thead><tr>';
  html += `<th class="role-header-cell role-col">POSITION</th>`;
  for (const d of dates) {
    const ds = dateStr(d);
    html += `<th><div class="date-header${ds === TODAY_STR ? ' today' : ''}">
      <span class="date-dow">${DOW[d.getDay()]}</span>
      <span class="date-num">${d.getDate()}</span>
      <span class="date-mon">${MON[d.getMonth()]}</span>
    </div></th>`;
  }
  html += '</tr></thead><tbody>';

  let total = 0, filled = 0, gaps = 0;

  for (const shift of ['day', 'night']) {
    html += `<tr class="shift-section-row ${shift}-section">
      <td class="role-col" colspan="${dates.length + 1}">
        ${shift === 'day' ? '&#9728; DAY SHIFT (12hr)' : '&#9790; NIGHT SHIFT (12hr)'}
      </td>
    </tr>`;

    for (const role of roles) {
      html += '<tr>';
      html += `<td class="role-col">
        <div class="role-cell-inner ${shift}-row">
          <div class="role-name-wrap">
            <span class="role-name">${role.name}</span>
            <span class="role-req">Req: ${role.req}/shift</span>
          </div>
          <button class="remove-role-btn" onclick="removeRoleFromGrid('${role.id}')" title="Remove">&#215;</button>
        </div>
      </td>`;

      for (const d of dates) {
        const ds       = dateStr(d);
        const assigned = getAssignedOn(currentSite, role.id, shift, ds);
        const count    = assigned.length;
        const req      = role.req;

        total++;
        if (count >= req) filled++;
        else if (count === 0) gaps++;

        const status = count >= req ? 'full' : count > 0 ? 'partial' : 'empty';
        const label  = count >= req ? 'staffed' : count > 0 ? 'partial' : 'gap';

        html += `<td class="slot-cell" onclick="openDrawer('${role.id}','${ds}','${shift}')">
          <div class="slot-inner ${status}">
            <span class="slot-count">${count}/${req}</span>
            <span class="slot-label">${label}</span>
          </div>
        </td>`;
      }
      html += '</tr>';
    }
  }

  html += '</tbody>';
  document.getElementById('sched-grid').innerHTML = html;

  const partial = total - filled - gaps;
  document.getElementById('summary-bar').innerHTML = `
    <div class="summary-item"><div class="summary-dot" style="background:var(--full)"></div>${filled} fully staffed</div>
    <div class="summary-item"><div class="summary-dot" style="background:var(--partial)"></div>${partial} partial</div>
    <div class="summary-item"><div class="summary-dot" style="background:var(--empty)"></div>${gaps} gaps</div>
    <div class="summary-item" style="margin-left:auto;font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--text-muted)">
      ${currentSite} &nbsp;|&nbsp; ${roles.length} positions
    </div>
  `;
}

// ============================================================
// DRAWER
// ============================================================
function openDrawer(roleId, ds, shift) {
  drawerState = { roleId, dateStr: ds, shift };
  renderDrawer();
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}

function renderDrawer() {
  if (!drawerState) return;
  const { roleId, dateStr: ds, shift } = drawerState;
  const role = ALL_ROLES.find(r => r.id === roleId);
  const d    = new Date(ds + 'T00:00:00');

  document.getElementById('drawer-title').textContent = role.name;
  document.getElementById('drawer-meta').innerHTML = `
    <span>${DOW[d.getDay()]}, ${MON[d.getMonth()]} ${d.getDate()}</span>
    <span class="shift-badge ${shift}">${shift.toUpperCase()} SHIFT</span>
    <span class="site-badge">${currentSite}</span>
  `;

  const assignedRecs  = getAssignedOn(currentSite, roleId, shift, ds);
  const assignedIds   = assignedRecs.map(a => a.contractorRecordId);

  const availCtrs = contractors.filter(c =>
    isAvailable(c, ds, shift) && !assignedIds.includes(c.recordId)
  );

  let html = `<div class="drawer-section-label">Assigned (${assignedRecs.length}/${role.req})</div>`;
  if (assignedRecs.length === 0) {
    html += `<div class="empty-state">No one assigned</div>`;
  } else {
    for (const rec of assignedRecs) {
      const c = contractors.find(x => x.recordId === rec.contractorRecordId);
      if (!c) continue;
      html += personRow(c, true, rec.recordId);
    }
  }

  html += `<div class="drawer-section-label" style="margin-top:20px">Available (${availCtrs.length})</div>`;
  if (availCtrs.length === 0) {
    html += `<div class="empty-state">No contractors available for this date${shift === 'night' ? '/shift' : ''}</div>`;
  } else {
    for (const c of availCtrs) {
      html += personRow(c, false, null);
    }
  }

  document.getElementById('drawer-body').innerHTML = html;
}

function personRow(c, isAssigned, assignmentRecordId) {
  const nightTag = c.nightOk
    ? `<span class="night-badge">NIGHTS OK</span>`
    : `<span style="color:var(--text-muted);font-size:10px">Day only</span>`;
  const roleTag = c.contractorRole
    ? `<span class="role-tag">${c.contractorRole}</span>`
    : '';
  const btn = isAssigned
    ? `<button class="remove-btn" onclick="doRemove('${assignmentRecordId}', this)">Remove</button>`
    : `<button class="assign-btn" onclick="doAssign('${c.recordId}', this)">Assign</button>`;
  return `<div class="person-row${isAssigned ? ' assigned' : ''}">
    <div class="avatar">${c.initials}</div>
    <div class="person-info">
      <div class="person-name">${c.name}</div>
      <div class="person-sub">${roleTag}${nightTag}</div>
    </div>
    ${btn}
  </div>`;
}

async function doAssign(contractorRecordId, btn) {
  btn.disabled = true;
  btn.textContent = '...';
  const { roleId, dateStr: ds, shift } = drawerState;
  const roleName = ALL_ROLES.find(r => r.id === roleId)?.name || roleId;

  try {
    const result = await apiCreateAssignment({
      contractorRecordId,
      location:    currentSite,
      startDate:   ds,
      endDate:     ds,
      roleAssigned: roleName,
      shift:        shift === 'day' ? 'Day' : 'Night',
    });
    if (result.error) throw new Error(result.error.message || result.error);

    // Add to local state
    assignments.push({
      recordId:           result.id,
      contractorRecordId,
      location:           currentSite,
      startDate:          ds,
      endDate:            ds,
      roleAssigned:       roleName,
      shift:              shift === 'day' ? 'Day' : 'Night',
      status:             'Active',
      confirmed:          false,
    });
    renderDrawer();
    renderGrid();
  } catch (err) {
    showError('Failed to assign: ' + err.message);
    btn.disabled = false;
    btn.textContent = 'Assign';
  }
}

async function doRemove(assignmentRecordId, btn) {
  btn.disabled = true;
  btn.textContent = '...';
  try {
    const result = await apiDeleteAssignment(assignmentRecordId);
    if (result.error) throw new Error(result.error.message || result.error);

    assignments = assignments.filter(a => a.recordId !== assignmentRecordId);
    renderDrawer();
    renderGrid();
  } catch (err) {
    showError('Failed to remove: ' + err.message);
    btn.disabled = false;
    btn.textContent = 'Remove';
  }
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}

// ============================================================
// CONTROLS
// ============================================================
function setSite(site, btn) {
  currentSite = site;
  document.querySelectorAll('.site-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadData();
}

function shiftWeek(delta) {
  weekOffset += delta;
  loadData();
}

// ============================================================
// INIT
// ============================================================
populateRolePicker();
loadData();
</script>
</body>
</html>
