<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOOMI &mdash; Contractor Heat Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"IBM Plex Sans",Arial,sans-serif;background:#0d1117;color:#e6edf3;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
#gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a4e7e 0%,#0d2d4a 100%);z-index:1000;}
.gate-card{background:#161b22;border-radius:12px;padding:40px;max-width:360px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.5);text-align:center;border:1px solid #2a3340;}
.gate-logo{font-family:"IBM Plex Mono",monospace;font-size:22px;font-weight:600;color:#7dbe42;letter-spacing:.12em;margin-bottom:6px;}
.gate-title{font-size:17px;font-weight:600;color:#e6edf3;margin-bottom:4px;}
.gate-sub{font-size:12px;color:#8fa3b8;margin-bottom:24px;}
.gate-input{width:100%;background:#1e2530;border:1.5px solid #2a3340;border-radius:8px;padding:12px 16px;font-size:15px;color:#e6edf3;font-family:"IBM Plex Mono",monospace;outline:none;text-align:center;letter-spacing:3px;transition:border-color .2s;}
.gate-input:focus{border-color:#7dbe42;}
.gate-btn{width:100%;margin-top:10px;background:#1a4e7e;color:#fff;border:none;border-radius:8px;padding:13px;font-size:14px;font-weight:600;cursor:pointer;font-family:"IBM Plex Sans",sans-serif;transition:background .2s;}
.gate-btn:hover{background:#2f6ea8;}
.gate-error{margin-top:10px;color:#e05252;font-size:12px;min-height:16px;}
#app{display:none;flex:1;flex-direction:column;height:100vh;}
.hdr{background:#1a4e7e;padding:0 20px;display:flex;align-items:center;gap:14px;height:50px;border-bottom:3px solid #7dbe42;flex-shrink:0;}
.hdr-logo{font-family:"IBM Plex Mono",monospace;font-size:13px;font-weight:600;color:#7dbe42;letter-spacing:.12em;}
.hdr-div{width:1px;height:22px;background:rgba(255,255,255,.2);}
.hdr-act{font-family:"IBM Plex Mono",monospace;font-size:11px;color:rgba(255,255,255,.55);letter-spacing:.08em;}
.hdr-title{font-size:13px;font-weight:600;color:#fff;}
.hdr-right{margin-left:auto;}
.ref-btn{background:transparent;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.75);padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;font-family:"IBM Plex Mono",monospace;}
.ref-btn:hover{background:rgba(255,255,255,.1);}
.stats-bar{background:#161b22;border-bottom:1px solid #2a3340;padding:5px 20px;display:flex;gap:20px;align-items:center;font-family:"IBM Plex Mono",monospace;font-size:11px;color:#8fa3b8;flex-shrink:0;flex-wrap:wrap;}
.stat-item{display:flex;align-items:center;gap:5px;}
.s-dot{width:6px;height:6px;border-radius:50%;background:#7dbe42;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.map-wrap{flex:1;position:relative;}
#map{position:absolute;inset:0;}
.legend{position:absolute;bottom:28px;right:10px;z-index:500;background:rgba(22,27,34,.95);border:1px solid #2a3340;border-radius:6px;padding:12px 14px;font-size:11px;color:#c0cad6;min-width:165px;box-shadow:0 4px 16px rgba(0,0,0,.4);}
.legend-title{font-family:"IBM Plex Mono",monospace;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#8fa3b8;margin-bottom:8px;}
.legend-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.legend-bubble{border-radius:50%;background:rgba(47,152,121,.5);border:2px solid #2f9879;flex-shrink:0;}
.legend-sep{border-top:1px solid #2a3340;margin:7px 0;}
.legend-act{font-family:"IBM Plex Mono",monospace;font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin:6px 0 4px;}
.leaflet-tooltip{background:#1e2530!important;border:1px solid #2a3340!important;color:#e6edf3!important;font-family:"IBM Plex Sans",Arial,sans-serif!important;font-size:12px!important;border-radius:4px!important;box-shadow:0 4px 12px rgba(0,0,0,.4)!important;}
.leaflet-container{background:#1a2030;}
</style>
</head>
<body>
<div id="gate">
  <div class="gate-card">
    <div class="gate-logo">LOOMI</div>
    <div class="gate-title">Contractor Heat Map</div>
    <div class="gate-sub">Loomex Response &amp; Readiness &bull; Restricted Access</div>
    <input class="gate-input" type="password" id="gi" placeholder="Access code" autocomplete="current-password">
    <button class="gate-btn" id="gate-btn">View Map</button>
    <div class="gate-error" id="ge"></div>
  </div>
</div>
<div id="app">
  <div class="hdr">
    <span class="hdr-logo">LOOMI</span>
    <div class="hdr-div"></div>
    <span class="hdr-act">2026-KASH-HUBHOST</span>
    <div class="hdr-div"></div>
    <span class="hdr-title">Contractor Heat Map</span>
    <div class="hdr-right">
      <button class="ref-btn" id="refresh-btn">&#8635; Refresh</button>
    </div>
  </div>
  <div class="stats-bar" id="stats-bar">
    <span class="stat-item"><span class="s-dot"></span>Loading&hellip;</span>
  </div>
  <div class="map-wrap">
    <div id="map"></div>
    <div class="legend">
      <div class="legend-title">Contractor Pool</div>
      <div class="legend-row"><div class="legend-bubble" style="width:10px;height:10px;"></div><span>1&ndash;2</span></div>
      <div class="legend-row"><div class="legend-bubble" style="width:16px;height:16px;"></div><span>3&ndash;7</span></div>
      <div class="legend-row"><div class="legend-bubble" style="width:24px;height:24px;"></div><span>8&ndash;15</span></div>
      <div class="legend-row"><div class="legend-bubble" style="width:34px;height:34px;"></div><span>16+</span></div>
      <div class="legend-sep"></div>
      <div class="legend-title" style="margin-bottom:4px">Sites</div>
      <div id="legend-sites">
        <div class="legend-row"><div style="width:14px;height:14px;background:#1a4e7e;border:2px solid #7dbe42;transform:rotate(45deg);flex-shrink:0;"></div><span>EOC</span></div>
        <div class="legend-row"><div style="width:14px;height:14px;background:#1a4e7e;border:2px solid #fff;border-radius:50%;flex-shrink:0;"></div><span>Hub Site</span></div>
        <div class="legend-row"><div style="width:14px;height:14px;background:#1a4e7e;border:2px solid #fff;border-radius:3px;flex-shrink:0;"></div><span>Host Site</span></div>
      </div>
    </div>
  </div>
</div>
<script>
var WORKER = 'https://evacscheduling.loomex-it.workers.dev';
var FSA_URL = 'https://tools.loomex.ca/fsa-coords.json';
var pass = sessionStorage.getItem('loomi_hm_pass') || '';
var map = null;
var fsaLayer = null;
var siteLayer = null;
var FSA_COORDS = null; // loaded dynamically

var ACTIVATION_PALETTE = ['#00A651','#d4a017','#2f9879','#7b5ea7','#e05252','#4a90d9'];

function bubbleRadius(count){return Math.max(5,Math.min(35,Math.sqrt(count)*5));}

function siteCategory(locationType){
  var lt=(locationType||'').toLowerCase();
  if(lt==='virtual'||lt==='eoc') return 'eoc';
  if(lt==='host') return 'host';
  return 'hub';
}

function siteIconHtml(category,color){
  var c=color||'#1a4e7e';
  if(category==='eoc')
    return '<div style="width:14px;height:14px;background:#1a4e7e;border:2px solid #7dbe42;transform:rotate(45deg);box-shadow:0 2px 8px rgba(0,0,0,.5);"></div>';
  if(category==='host')
    return '<div style="width:14px;height:14px;background:'+c+';border:2px solid rgba(255,255,255,.9);border-radius:3px;box-shadow:0 2px 8px rgba(0,0,0,.5);"></div>';
  return '<div style="width:14px;height:14px;background:'+c+';border:2px solid rgba(255,255,255,.9);border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.5);"></div>';
}

document.getElementById('gate-btn').addEventListener('click',function(){
  var v=document.getElementById('gi').value.trim();if(!v)return;pass=v;loadAll();
});
document.getElementById('gi').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('gate-btn').click();});
document.getElementById('refresh-btn').addEventListener('click',function(){loadData();});

function initMap(){
  if(map)return;
  // Centre on Canada, zoom to show all provinces
  map=L.map('map',{center:[54.0,-96.0],zoom:4,zoomControl:true});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
    attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
    maxZoom:13
  }).addTo(map);
}

async function loadAll(){
  document.getElementById('ge').textContent='';
  // Load FSA coords and heatmap data in parallel
  try{
    var results=await Promise.all([
      fetch(FSA_URL).then(function(r){return r.json();}),
      fetch(WORKER+'/heatmap-data?pass='+encodeURIComponent(pass)).then(function(r){
        if(r.status===401)throw new Error('UNAUTHORIZED');
        if(!r.ok)throw new Error('HTTP '+r.status);
        return r.json();
      })
    ]);
    FSA_COORDS=results[0];
    var data=results[1];
    sessionStorage.setItem('loomi_hm_pass',pass);
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='flex';
    initMap();
    renderMap(data);
  }catch(e){
    if(e.message==='UNAUTHORIZED'){
      document.getElementById('ge').textContent='Incorrect access code.';
      document.getElementById('gate').style.display='flex';
      document.getElementById('app').style.display='none';
      sessionStorage.removeItem('loomi_hm_pass');
    } else {
      document.getElementById('ge').textContent='Error: '+e.message;
    }
  }
}

async function loadData(){
  if(!FSA_COORDS){loadAll();return;}
  try{
    var res=await fetch(WORKER+'/heatmap-data?pass='+encodeURIComponent(pass));
    if(!res.ok)return;
    renderMap(await res.json());
  }catch(e){}
}

function renderMap(data){
  if(fsaLayer){map.removeLayer(fsaLayer);fsaLayer=null;}
  if(siteLayer){map.removeLayer(siteLayer);siteLayer=null;}
  fsaLayer=L.layerGroup();
  siteLayer=L.layerGroup();

  // Build activation -> colour map
  var actColours={},actOrder=[];
  for(var i=0;i<data.sites.length;i++){
    var act=data.sites[i].activationTitle||'Unknown';
    if(!actColours[act]){actColours[act]=ACTIVATION_PALETTE[actOrder.length%ACTIVATION_PALETTE.length];actOrder.push(act);}
  }

  // Contractor FSA bubbles
  var totalContractors=0,plotted=0,missing=[];
  for(var fsa in data.fsaMap){
    var count=data.fsaMap[fsa];
    totalContractors+=count;
    var coords=FSA_COORDS[fsa];
    if(!coords){missing.push(fsa+'('+count+')');continue;}
    plotted+=count;
    (function(f,c,co){
      var circle=L.circleMarker([co[0],co[1]],{
        radius:bubbleRadius(c),fillColor:'#2f9879',color:'#1f7a5e',
        weight:1.5,opacity:0.9,fillOpacity:0.5
      });
      circle.bindTooltip('<strong>'+f+'</strong><br><span style="color:#2f9879">'+c+' contractor'+(c!==1?'s':'')+'</span>',
        {permanent:false,direction:'top',offset:[0,-4]});
      circle.addTo(fsaLayer);
    })(fsa,count,coords);
  }

  // Site markers
  for(var i=0;i<data.sites.length;i++){
    var site=data.sites[i];
    var siteCoords=FSA_COORDS[site.postalCode];
    if(!siteCoords)continue;
    var cat=siteCategory(site.locationType);
    var actColour=actColours[site.activationTitle||'Unknown']||ACTIVATION_PALETTE[0];
    var typeLabel=cat==='eoc'?'EOC':cat==='host'?'Host Site':'Hub Site';
    (function(s,co,c,tl,ic){
      var icon=L.divIcon({html:ic,iconSize:[14,14],iconAnchor:[7,7],className:''});
      var marker=L.marker([co[0],co[1]],{icon:icon,zIndexOffset:1000});
      marker.bindTooltip('<strong>'+s.name+'</strong><br><span style="color:#8fa3b8;font-size:10px">'+tl+(s.activationTitle?' &bull; '+s.activationTitle:'')+'</span>',
        {permanent:false,direction:'top',offset:[0,-8]});
      marker.addTo(siteLayer);
    })(site,siteCoords,actColour,typeLabel,siteIconHtml(cat,actColour));
  }

  fsaLayer.addTo(map);
  siteLayer.addTo(map);

  // Stats
  var lu=new Date();
  var unplotted=totalContractors-plotted;
  var statsHtml=
    '<span class="stat-item"><span class="s-dot"></span>Updated '+lu.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'})+'</span>'+
    '<span class="stat-item"><span style="width:7px;height:7px;border-radius:50%;background:#2f9879;display:inline-block;"></span>'+totalContractors+' active contractors</span>'+
    '<span class="stat-item"><span style="width:7px;height:7px;border-radius:50%;background:#1a4e7e;display:inline-block;"></span>'+data.sites.length+' sites</span>';
  if(unplotted>0){
    statsHtml+='<span class="stat-item" style="color:#d4a017;">&#9888; '+unplotted+' contractors missing valid postal code</span>';
  }
  document.getElementById('stats-bar').innerHTML=statsHtml;

  // Legend
  var legendHtml='<div class="legend-row"><div style="width:14px;height:14px;background:#1a4e7e;border:2px solid #7dbe42;transform:rotate(45deg);flex-shrink:0;"></div><span>EOC</span></div>';
  for(var ai=0;ai<actOrder.length;ai++){
    var act=actOrder[ai],col=actColours[act];
    legendHtml+='<div class="legend-act" style="color:'+col+'">'+act+'</div>';
    legendHtml+='<div class="legend-row"><div style="width:14px;height:14px;background:'+col+';border:2px solid rgba(255,255,255,.9);border-radius:50%;flex-shrink:0;"></div><span>Hub Site</span></div>';
    var hasHost=data.sites.some(function(s){return s.activationTitle===act&&siteCategory(s.locationType)==='host';});
    if(hasHost){legendHtml+='<div class="legend-row"><div style="width:14px;height:14px;background:'+col+';border:2px solid rgba(255,255,255,.9);border-radius:3px;flex-shrink:0;"></div><span>Host Site</span></div>';}
  }
  document.getElementById('legend-sites').innerHTML=legendHtml;

  // Zoom to show all plotted contractor bubbles
  var bounds=[];
  for(var fsa in data.fsaMap){if(FSA_COORDS[fsa])bounds.push(FSA_COORDS[fsa]);}
  for(var i=0;i<data.sites.length;i++){if(FSA_COORDS[data.sites[i].postalCode])bounds.push(FSA_COORDS[data.sites[i].postalCode]);}
  if(bounds.length>0){map.fitBounds(bounds,{padding:[40,40]});}
}

if(pass)loadAll();
</script>
</body>
</html>
